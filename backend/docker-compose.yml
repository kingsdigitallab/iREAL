name: ireal

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./data/2_final/qdrant:/qdrant/storage:z

  redis:
    image: redis/redis-stack
    ports:
      - 6379:6379
      - 8001:8001
    volumes:
      - ./data/1_interim/redis:/data

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - 6006:6006
      - 4317:4317
